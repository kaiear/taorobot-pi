# joint_limits.yaml allows the dynamics properties specified in the URDF to be overwritten or augmented as needed

# Runtime default scaling used by MoveIt when requests do not specify scaling.
default_velocity_scaling_factor: 0.4
default_acceleration_scaling_factor: 0.4

# MoveIt controls only the main arm joints. Hand joints arm_5_x and wheel joints are fixed in URDF.
joint_limits:
  arm_0_joint:
    has_velocity_limits: true
    max_velocity: 2.0
    has_acceleration_limits: true
    max_acceleration: 6.0
  arm_1_joint:
    has_velocity_limits: true
    max_velocity: 2.0
    has_acceleration_limits: true
    max_acceleration: 6.0
  arm_2_joint:
    has_velocity_limits: true
    max_velocity: 2.0
    has_acceleration_limits: true
    max_acceleration: 6.0
  arm_3_joint:
    has_velocity_limits: true
    max_velocity: 2.0
    has_acceleration_limits: true
    max_acceleration: 6.0
  arm_4_joint:
    has_velocity_limits: true
    max_velocity: 2.0
    has_acceleration_limits: true
    max_acceleration: 6.0

controller_list:
  - name: fake_arm_controller
    type: $(arg fake_execution_type)
    joints:
      - arm_0_joint
      - arm_1_joint
      - arm_2_joint
      - arm_3_joint
      - arm_4_joint
  - name: fake_hand_controller
    type: $(arg fake_execution_type)
    joints:
      - arm_5_1_joint
      - arm_5_2_joint
      - arm_5_3_joint
      - arm_5_4_joint
      - arm_5_5_joint
      - arm_5_6_joint
initial:  # Define initial robot poses per group
  - group: arm
    pose: home
  - group: hand
    pose: open